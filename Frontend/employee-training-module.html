<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employee Training Module</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: rgb(199, 190, 190);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        p {
            text-align: center;
        }

        .module-card {
            background-color: lightblue;
            width: 700px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid black;
        }

        .status {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background-color: purple;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkmagenta;
        }
    </style>

</head>

<body>

    <h1>Employee Training Module</h1>

    <p>View assigned modules, complete training and submit assignments.</p>

    <hr style="border:1px solid black;">

    <div id="modulesContainer"> <!-- Container for training modules -->

    </div>

    <script>


        fetch("http://localhost:8080/training-modules") // Fetches the list of training modules from the backend API
            .then(response => response.json()) // converts the response to JSON format
            .then(modules => { // processes the list of modules received from the backend

                const container =
                    document.getElementById("modulesContainer"); // Gets container element where modules will be displayed

                modules.forEach(module => { //for every module in the list, creates a card with module details

                container.innerHTML += // Adds the module details to the container's inner HTML
                `
    
                <div class="module-card"> 
    
                    <h2>${module.moduleName}</h2>
    
                    <p>
                        <strong>Description:</strong>
                        ${module.description}
                    </p>
    
                    <p>
                        <strong>Material:</strong>
                        <a href="${module.materialLink}" target="_blank">
                            ${module.materialLink}
                        </a>
                    </p>
    
                    <p>
                        <strong>Deadline:</strong>
                        ${module.deadline}
                    </p>
    
                    <p class="status"
                        id="status-${module.id}">
                        Status: Pending
                    </p>
    
                    <button
                        id="complete-${module.id}"
                        disabled
                        onclick="markComplete(${module.id})">
                        Mark Complete
                    </button>
    
                    <h3>Submit Assignment</h3>
    
                    <input
                        type="text"
                        id="assignment-${module.id}"
                        placeholder="Paste GitHub / Google Drive Link"
                    >
    
                    <button onclick="submitAssignment(${module.id})">
                        Submit Assignment
                    </button>
    
                </div>
    
                `//all the above HTML is added to the container for each module in the list

                });

            });

        async function submitAssignment(moduleId) { //Function to handle assignment submission for a specific module identified by moduleId

            let assignmentLink =
                document.getElementById(
                    `assignment-${moduleId}` //Gets the value of the assignment link input field for the specific module using its ID
                ).value;

            if (assignmentLink.trim() === "") { // If the assignment link is empty, shows an alert and exits the function without submitting.

                alert("Please enter an assignment link first.");
                return;
            }

            const trainingProgress = { //Creates an object that cointains the details of the training progress

                employeeId: 1,

                trainingModuleId: moduleId, // Associates the progress with the specific training module using its ID

                assignmentLink: assignmentLink,

                completed: false // Initially sets the completed status to false when submitting the assignment
            };

            const response = await fetch( //Sends a request to the backend API to submit the assignment for the specific training module.
                "http://localhost:8080/training-progress",
                {
                    method: "POST",// Indicates that this is a POST request to create a new resource on the server
                    headers: {
                        "Content-Type": "application/json"// Specifies that the request body is in JSON format
                    },
                    body: JSON.stringify(trainingProgress)// Converts the trainingProgress object to a JSON string
                }
            );

            if (response.ok) {

                alert("Assignment Submitted Successfully!");

                document.getElementById(
                    `complete-${moduleId}` // Enables the "Mark Complete" button for the specific module after successful assignment submission
                ).disabled = false; // Disables the "Mark Complete" button for the specific module after successful assignment submission
            }
            else {

                alert("Failed to Submit Assignment.");
            }
        }

        async function markComplete(moduleId) { //Function to handle marking a specific training module as completed, identified by moduleId

            const response = await fetch(
                `http://localhost:8080/training-progress/${moduleId}/complete`, // Sends a request to the backend API to mark the specific training module as completed using its ID
                {
                    method: "PUT" // Indicates that this is a PUT request to update an existing resource on the server
                }
            );

            if (response.ok) {

                alert("Training Module Marked as Completed!");

                document.getElementById(
                    `status-${moduleId}` // Updates the status text for the specific module to "Completed" after successfully marking it as completed
                ).innerText = "Status: Completed"; 

                document.getElementById(
                    `complete-${moduleId}` // Disables the "Mark Complete" button for the specific module after successfully marking it as completed
                ).innerText = "Completed"; // Changes the button text to "Completed" for the specific module after successfully marking it as completed

                document.getElementById(
                    `complete-${moduleId}`// Disables the "Mark Complete" button for the specific module after successfully marking it as completed
                ).disabled = true; 
            }
            else {

                alert("Failed to Mark Complete.");
            }
        }


    </script>

</body>

</html>
