<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weekly Performance Review</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: rgb(199, 190, 190);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        p {
            text-align: center;
        }

        form {
            background-color: lightblue;
            width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid black;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            background-color: purple;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkmagenta;
        }
    </style>

</head>

<body>

    <h1>Weekly Performance Review</h1>

    <p>Submit employee performance reviews.</p>

    <hr style="border: 1px solid black;">

    <form id="reviewForm">

        <label for="employee">
            Employee:
        </label>

        <select id="employee" required>

            <option value="">
                Select Employee <!-- created dropdown for employees -->
            </option>

        </select>

        <label for="rating">
            Rating (1-5):
        </label>

        <select id="rating" required>

            <option value="">
                Select Rating
            </option>

            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>

        </select>

        <label for="comments">
            Comments:
        </label>

        <textarea id="comments" rows="4" placeholder="Enter comments" required></textarea>

        <label for="improvementAreas">
            Improvement Areas:
        </label>

        <textarea id="improvementAreas" rows="4" placeholder="Enter improvement areas" required></textarea>

        <button type="submit">
            Submit Review
        </button>

    </form>
    <script>

        fetch("http://localhost:8080/employees") // Fetches the list of employees from the backend API
            .then(response => response.json())// Converts the response to JSON
            .then(employees => {// Processes the list of employees

                const employeeDropdown =
                    document.getElementById("employee");// Gets the employee dropdown element

                employees.forEach(employee => {// Iterates through each employee and adds them to the dropdown

                    employeeDropdown.innerHTML += //makes the dropdown list of employees dynamically
                        `
            <option value="${employee.id}">
                ${employee.name}
            </option>
            `;// Adds an option for each employee to the dropdown
                });

            });

        document.getElementById("reviewForm")// Gets the review form element
            .addEventListener("submit", async function (event) {// Adds an event listener for the form submission

                event.preventDefault();// Prevents the default form submission behavior

                const performanceReview = {// Creates a performance review object with the form data

                    employeeId:
                        document.getElementById("employee").value,// Gets the selected employee ID from the dropdown

                    rating:
                        document.getElementById("rating").value,// Gets the selected rating from the dropdown

                    comments:
                        document.getElementById("comments").value,// Gets the comments from the textarea

                    improvementAreas:
                        document.getElementById("improvementAreas").value// Gets the improvement areas from the textarea
                };

                const response = await fetch(
                    "http://localhost:8080/performance-reviews",// Sends a POST request to the backend API to submit the performance review
                    {
                        method: "POST",// Specifies the method as POST
                        headers: {
                            "Content-Type": "application/json"// Specifies the content type as JSON
                        },
                        body: JSON.stringify(performanceReview)// Converts the performance review object to a JSON string and sends it in the request body
                    }
                );

                if (response.ok) {

                    alert("Performance Review Submitted Successfully!");

                    document.getElementById("reviewForm").reset();// Resets the form after successful submission
                }
                else {

                    alert("Failed to Submit Review.");
                }

            });

    </script>

</body>

</html>
