<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Weekly Performance Review</title>

    <style>

        body{
            font-family:sans-serif;
            background-color:rgb(199,190,190);
            margin:0;
            padding:20px;
        }

        h1,h2,p{
            text-align:center;
        }

        form{
            background-color:lightblue;
            width:600px;
            margin:20px auto;
            padding:20px;
            border-radius:10px;
            border:1px solid black;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:8px;
            margin-top:5px;
            box-sizing:border-box;
        }

        textarea{
            resize:vertical;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background-color:purple;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkmagenta;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            margin-top:20px;
        }

        table,
        th,
        td{
            border:1px solid black;
        }

        th,
        td{
            padding:10px;
            text-align:center;
        }

        th{
            background-color:lightblue;
        }

    </style>

</head>

<body>

<h1>Weekly Performance Review</h1>

<p>Submit and manage employee performance reviews.</p>

<hr>

<form id="performanceReviewForm">

    <label for="reviewId">Review ID:</label>
    <input
        type="number"
        id="reviewId"
        placeholder="Enter Review ID for Update/Delete">

    <label for="employeeId">Employee ID:</label>
    <input
        type="number"
        id="employeeId"
        placeholder="Enter Employee ID"
        required>

    <label for="rating">Rating (1-5):</label>
    <input
        type="number"
        id="rating"
        min="1"
        max="5"
        required>

    <label for="comments">Comments:</label>
    <textarea
        id="comments"
        rows="4"
        placeholder="Enter Comments"
        required></textarea>

    <label for="improvementAreas">Improvement Areas:</label>
    <textarea
        id="improvementAreas"
        rows="4"
        placeholder="Enter Improvement Areas"
        required></textarea>

    <label for="reviewDate">Review Date:</label>
    <input
        type="date"
        id="reviewDate"
        required>

    <button type="submit">
        Submit Review
    </button>

    <button
        type="button"
        onclick="updateReview()">

        Update Review

    </button>

    <button
        type="button"
        onclick="deleteReview()">

        Delete Review

    </button>

    <button
        type="button"
        onclick="window.location.href='trainer-dashboard.html'">

        Back to Dashboard

    </button>

</form>

<hr>

<h2>Current Performance Reviews</h2>

<table id="reviewTable">

    <thead>

        <tr>

            <th>ID</th>
            <th>Employee ID</th>
            <th>Rating</th>
            <th>Comments</th>
            <th>Improvement Areas</th>
            <th>Review Date</th>

        </tr>

    </thead>

    <tbody>

    </tbody>

</table>

<script>

async function loadReviews(){

    const response = await fetch(
        "http://localhost:8080/performance-reviews"
    );

    const reviews = await response.json();

    const tableBody =
        document.querySelector("#reviewTable tbody");

    tableBody.innerHTML="";

    reviews.forEach(review=>{

        tableBody.innerHTML+=`

        <tr>

            <td>${review.id}</td>

            <td>${review.employeeId}</td>

            <td>${review.rating}</td>

            <td>${review.comments}</td>

            <td>${review.improvementAreas}</td>

            <td>${review.reviewDate}</td>

        </tr>

        `;

    });

}

document.getElementById("performanceReviewForm")
.addEventListener("submit",async function(event){

    event.preventDefault();

    const review={

        employeeId:parseInt(document.getElementById("employeeId").value),

        rating:parseInt(document.getElementById("rating").value),

        comments:document.getElementById("comments").value,

        improvementAreas:document.getElementById("improvementAreas").value,

        reviewDate:document.getElementById("reviewDate").value

    };

    const response=await fetch(

        "http://localhost:8080/performance-reviews",

        {

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify(review)

        }

    );

    if(response.ok){

        alert("Performance Review Submitted Successfully!");

        document.getElementById("performanceReviewForm").reset();

        loadReviews();

    }

    else{

        alert("Failed to Submit Review.");

    }

});

async function updateReview(){

    const reviewId=document.getElementById("reviewId").value;

    const review={

        employeeId:parseInt(document.getElementById("employeeId").value),

        rating:parseInt(document.getElementById("rating").value),

        comments:document.getElementById("comments").value,

        improvementAreas:document.getElementById("improvementAreas").value,

        reviewDate:document.getElementById("reviewDate").value

    };

    const response=await fetch(

        "http://localhost:8080/performance-reviews/"+reviewId,

        {

            method:"PUT",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify(review)

        }

    );

    if(response.ok){

        alert("Performance Review Updated Successfully!");

        document.getElementById("performanceReviewForm").reset();

        loadReviews();

    }

    else{

        alert("Update Failed!");

    }

}

async function deleteReview(){

    const reviewId=document.getElementById("reviewId").value;

    const response=await fetch(

        "http://localhost:8080/performance-reviews/"+reviewId,

        {

            method:"DELETE"

        }

    );

    if(response.ok){

        alert("Performance Review Deleted Successfully!");

        document.getElementById("performanceReviewForm").reset();

        loadReviews();

    }

    else{

        alert("Delete Failed!");

    }

}

loadReviews();

</script>

</body>

</html>
