<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            background-color: rgb(199, 190, 190);
            font-family:sans-serif;
        }
        h1{
            color: black;
            text-align: center;
        }
        p{
            color: black;
            text-align: left;
        }
         h2 {
            color: black;
            text-align: center;
        }
        button {
            background-color: purple;
            border: 1px solid #000000;
            color: white;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        button:hover {
            background-color: darkmagenta;
        }
        .card {
            background-color: lightblue;
            border: 1px solid #000000;
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <p style="font-size: large;"> Welcome Admin!. Here are all the details: </p>
    <hr style="border: 1px solid #000000;">
    <h2> <u>Overview</u> </h2>
    <div class="card">
        <h3>Total Employees: </h3>
        <p style="text-align: center;" id="employeeCount">Loading...</p>
    </div>
    <div class="card">
        <h3>Active Training Programs: </h3>
        <p style="text-align: center;" id="trainingCount">Loading...</p>
    </div>
    <div class="card">
        <h3>Completion Rate: </h3>
        <p style="text-align: center;" id="completionRate">Loading...</p>
    </div>
    <div class="card">
        <h3>Underperforming Employees: </h3>
        <p style="text-align: center;" id="underperformingCount">Loading...</p>
    </div>
    <br>
        <h2 style="text-align: left;"><u>Employee Onboarding</u></h2>
        <p>Click below to add a new employee: </p>
        <button onclick="window.location.href='employee-onboarding-admin.html'">Add Employee</button>
    <br>
    <br>
<script>
    fetch("http://localhost:8080/employees/count")
        .then(response => response.text())
        .then(data => {
            document.getElementById("employeeCount").innerText = data;
        });
    fetch("http://localhost:8080/trainings/count")
        .then(response => response.text())
        .then(data => {
            document.getElementById("trainingCount").innerText = data;
        });
    fetch("http://localhost:8080/completion-rate")
        .then(response => response.text())
        .then(data => {
            document.getElementById("completionRate").innerText = data + "%";
        });
    fetch("http://localhost:8080/underperforming/count")
        .then(response => response.text())
        .then(data => {
            document.getElementById("underperformingCount").innerText = data;
        });
</script>
</body>
</html>
