<!DOCTYPE html>
<html lang="en">

<head>
    <title>Employee Onboarding</title>
</head>
<style>
    body {
        font-family: sans-serif;
        background-color: rgb(199, 190, 190);
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    p {
        text-align: center;
    }

    form {
        background-color: lightblue;
        width: 500px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid black;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input,
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button {
        background-color: purple;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        margin-top: 20px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background-color: darkmagenta;
    }
</style>

<body>
    <h1>Employee Onboarding</h1>
    <p>Add a new employee to the system.</p>
    <hr style="border: 1px solid #000000;">
    <form id="employeeForm">
        <div>
            <label for="employeeId">Employee ID:</label>
            <input type="number" id="employeeId" placeholder="Enter Employee ID">
            <label for="name">Employee Name:</label>
            <input type="text" id="name" placeholder="Enter employee name" required>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter employee email" required>

            <label for="department">Department:</label>
            <select id="department" required>
                <option value="">Select Department</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
            </select>

            <label for="trainer">Assign Trainer:</label>
            <select id="trainer">
                <option value="">Select Trainer</option>
                <option value="Rahul Sharma">Rahul Sharma</option>
                <option value="Amit Kumar">Amit Kumar</option>
                <option value="Priya Singh">Priya Singh</option>
            </select>

            <label for="joining-date">Joining Date:</label>
            <input type="date" id="joining-date">

            <label for="duration">Training Duration (Weeks):</label>
            <input type="number" id="duration" placeholder="Enter duration">

            <button type="submit">Add Employee</button>

            <button type="button" onclick="updateEmployee()">
                Update Employee
            </button>

            <button type="button" onclick="deleteEmployee()">
                Delete Employee
            </button>
            
            <button type="button" onclick="window.location.href='admin-dashboard.html'">
                Back to Dashboard
            </button>
    </form>
    <hr>
    
    <h2>Current Employees</h2>
    
    <table border="1" id="employeeTable" style="width:100%; border-collapse:collapse; text-align:center;">
    
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Trainer</th>
                <th>Joining Date</th>
                <th>Training Duration</th>
            </tr>
        </thead>
    
        <tbody>
    
        </tbody>
    
    </table>
    <script>
        async function loadEmployees() {

            const response = await fetch("http://localhost:8080/employees");

            const employees = await response.json();

            const tableBody = document.querySelector("#employeeTable tbody");

            tableBody.innerHTML = "";

            employees.forEach(employee => {

            tableBody.innerHTML += `
                <tr>
                    <td>${employee.id}</td>
                    <td>${employee.name}</td>
                    <td>${employee.email}</td>
                    <td>${employee.department}</td>
                    <td>${employee.trainer}</td>
                    <td>${employee.joiningDate}</td>
                    <td>${employee.trainingDuration}</td>
                </tr>
            `;

        });

    }
        document.getElementById("employeeForm") //find the form with the id "employeeForm"
            .addEventListener("submit", async function (event) { //add an event listener, when form submitted run the function

                event.preventDefault(); //prevent the default form submission behavior

                const employee = { //create an object with all the employee details

                    name: document.getElementById("name").value,//get the value of the input field with id "name"

                    email: document.getElementById("email").value,

                    department: document.getElementById("department").value,

                    trainer: document.getElementById("trainer").value,

                    joiningDate: document.getElementById("joining-date").value,

                    trainingDuration: parseInt( //convert text input to integer
                        document.getElementById("duration").value
                    )

                };

                const response = await fetch(//send a request to the backend server to add the employee
                    "http://localhost:8080/employees",
                    {
                        method: "POST",//take data and save it to the database
                        headers: {
                            "Content-Type": "application/json" //data is in JSON format
                        },
                        body: JSON.stringify(employee) //convert to JSON string
                    }
                );

                if (response.ok) {
                    alert("Employee Added Successfully!");
                    document.getElementById("employeeForm").reset();//reset the form after successful submission
                    loadEmployees(); //reload the employee list to show the newly added employee
                }
                else {
                    alert("Failed to add employee.");
                }

            });

        async function updateEmployee() {

            const updatedEmployee = {

                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                department: document.getElementById("department").value,
                trainer: document.getElementById("trainer").value,
                joiningDate: document.getElementById("joining-date").value,
                trainingDuration: parseInt(
                    document.getElementById("duration").value
                )

            };

            const employeeId = document.getElementById("employeeId").value;

            const response = await fetch(
                "http://localhost:8080/employees/" + employeeId,
                {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(updatedEmployee)
                }
            );

            if (response.ok) {
                alert("Employee Updated Successfully!");
                document.getElementById("employeeForm").reset();
                loadEmployees();
            }
            else {
                alert("Update Failed!");
            }
        }

        async function deleteEmployee() {

            const employeeId = document.getElementById("employeeId").value;
            const response = await fetch(
                "http://localhost:8080/employees/" + employeeId,
                {
                    method: "DELETE"
                }
            );

            if (response.ok) {
                alert("Employee Deleted Successfully!");
                document.getElementById("employeeForm").reset();
                loadEmployees();
            }
            else {
                alert("Delete Failed!");
            }
        }
        loadEmployees();
    </script>
</body>

</html>
