<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Training Module Management</title>

    <style>

        body{
            font-family: sans-serif;
            background-color: rgb(199, 190, 190);
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        p{
            text-align: center;
        }

        form{
            background-color: lightblue;
            width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid black;
        }

        label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea{
            resize: vertical;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            background-color: purple;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkmagenta;
        }

    </style>

</head>
<body>

    <h1>Training Module Management</h1>

    <p>Create and manage training programs for employees.</p>

    <hr style="border: 1px solid black;">

    <form id="trainingModuleForm">

        <label for="moduleId">Module ID:</label>
        <input type="number" id="moduleId" placeholder="Enter Module ID for Update/Delete">

        <label for="moduleName">Module Name:</label>
        <input
            type="text"
            id="moduleName"
            placeholder="Enter module name"
            required
        >

        <label for="description">Module Description:</label>
        <textarea
            id="description"
            rows="4"
            placeholder="Enter module description"
            required
        ></textarea>

        <label for="materialLink">Material Link (PDF / Video):</label>
        <input
            type="url"
            id="materialLink"
            placeholder="Paste PDF or Video link"
            required
        >

        <label for="deadline">Deadline:</label>
        <input
            type="date"
            id="deadline"
            required
        >

        <label for="quiz">Assign Quiz:</label>
        <select id="quiz">
            <option value="">Select Quiz</option>
            <option value="Java Basics Quiz">Java Basics Quiz</option>
            <option value="Spring Boot Quiz">Spring Boot Quiz</option>
            <option value="DBMS Quiz">DBMS Quiz</option>
        </select>

        <button type="submit">
            Create Training Module
        </button>

        <button type="button" onclick="updateTrainingModule()">
            Update Training Module
        </button>
        
        <button type="button" onclick="deleteTrainingModule()">
            Delete Training Module
        </button>

        <button type="button" onclick="window.location.href='trainer-dashboard.html'">
        
            Back to Dashboard
        
        </button>

    </form>
    <hr>
    
    <h2>Current Training Modules</h2>
    
    <table border="1" id="trainingModuleTable" style="width:100%; border-collapse:collapse; text-align:center;">
    
        <thead>
    
            <tr>
    
                <th>ID</th>
                <th>Module Name</th>
                <th>Description</th>
                <th>Material Link</th>
                <th>Deadline</th>
                <th>Assigned Quiz</th>
    
            </tr>
    
        </thead>
    
        <tbody>
    
        </tbody>
    
    </table>
<script>
    async function loadTrainingModules() {

        const response = await fetch(
            "http://localhost:8080/training-modules"
        );

        const modules = await response.json();

        const tableBody =
            document.querySelector("#trainingModuleTable tbody");

        tableBody.innerHTML = "";

        modules.forEach(module => {

            tableBody.innerHTML += `

                <tr>

                    <td>${module.id}</td>

                    <td>${module.moduleName}</td>

                    <td>${module.description}</td>

                    <td>${module.materialLink}</td>

                    <td>${module.deadline}</td>

                    <td>${module.assignedQuiz}</td>

                </tr>

            `;

        });

    }

    document.getElementById("trainingModuleForm") //gets the form element by its ID and adds an event listener
        .addEventListener("submit", async function (event) {

            event.preventDefault(); //prevents the default form submission behavior, which would cause a page reload.

            const trainingModule = { //Creates JS object trainingModule that gets the values from the form fields.

                moduleName: document.getElementById("moduleName").value,//Gets the value of the module name input field.

                description: document.getElementById("description").value,

                materialLink: document.getElementById("materialLink").value,

                deadline: document.getElementById("deadline").value,

                assignedQuiz: document.getElementById("quiz").value
            };

            const response = await fetch( //Sends a fetch request to backend API to add the new training module to the database.
                "http://localhost:8080/training-modules",
                {
                    method: "POST",//sends data to the server
                    headers: {
                        "Content-Type": "application/json"//indicates that the request body is in JSON format
                    },
                    body: JSON.stringify(trainingModule)//converts string to JSON
                }
            );

            if (response.ok) {
                alert("Training Module Added Successfully!");
                document.getElementById("trainingModuleForm").reset();//resets the form fields to their default values
                loadTrainingModules(); //reloads the list of training modules to show the newly added module
            }
            else {
                alert("Failed to Add Training Module.");
            }

        });

        async function updateTrainingModule() {

            const moduleId = document.getElementById("moduleId").value;

            const updatedModule = {

                moduleName: document.getElementById("moduleName").value,

                description: document.getElementById("description").value,

                materialLink: document.getElementById("materialLink").value,

                deadline: document.getElementById("deadline").value,

                assignedQuiz: document.getElementById("quiz").value

        };

        const response = await fetch(
            "http://localhost:8080/training-modules/" + moduleId,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(updatedModule)
            }
        );

        if (response.ok) {

            alert("Training Module Updated Successfully!");

            document.getElementById("trainingModuleForm").reset();

            loadTrainingModules();

        }
        else {

            alert("Update Failed!");

        }

    }
    
    async function deleteTrainingModule() {

        const moduleId = document.getElementById("moduleId").value;

        const response = await fetch(
            "http://localhost:8080/training-modules/" + moduleId,
            {
                method: "DELETE"
            }
        );

        if (response.ok) {

            alert("Training Module Deleted Successfully!");

            document.getElementById("trainingModuleForm").reset();

            loadTrainingModules();

        }
        else {

            alert("Delete Failed!");

        }

    }

loadTrainingModules();
</script>
</body>
</html>
