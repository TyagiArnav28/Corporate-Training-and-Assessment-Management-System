<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Training Module Management</title>

    <style>

        body{
            font-family: sans-serif;
            background-color: rgb(199, 190, 190);
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        p{
            text-align: center;
        }

        form{
            background-color: lightblue;
            width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid black;
        }

        label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea{
            resize: vertical;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            background-color: purple;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkmagenta;
        }

    </style>

</head>
<body>

    <h1>Training Module Management</h1>

    <p>Create and manage training programs for employees.</p>

    <hr style="border: 1px solid black;">

    <form id="trainingModuleForm">

        <label for="moduleName">Module Name:</label>
        <input
            type="text"
            id="moduleName"
            placeholder="Enter module name"
            required
        >

        <label for="description">Module Description:</label>
        <textarea
            id="description"
            rows="4"
            placeholder="Enter module description"
            required
        ></textarea>

        <label for="materialLink">Material Link (PDF / Video):</label>
        <input
            type="url"
            id="materialLink"
            placeholder="Paste PDF or Video link"
            required
        >

        <label for="deadline">Deadline:</label>
        <input
            type="date"
            id="deadline"
            required
        >

        <label for="quiz">Assign Quiz:</label>
        <select id="quiz">
            <option value="">Select Quiz</option>
            <option value="Java Basics Quiz">Java Basics Quiz</option>
            <option value="Spring Boot Quiz">Spring Boot Quiz</option>
            <option value="DBMS Quiz">DBMS Quiz</option>
        </select>

        <button type="submit">
            Create Training Module
        </button>

    </form>
<script>

    document.getElementById("trainingModuleForm") //gets the form element by its ID and adds an event listener
        .addEventListener("submit", async function (event) {

            event.preventDefault(); //prevents the default form submission behavior, which would cause a page reload.

            const trainingModule = { //Creates JS object trainingModule that gets the values from the form fields.

                moduleName: document.getElementById("moduleName").value,//Gets the value of the module name input field.

                description: document.getElementById("description").value,

                materialLink: document.getElementById("materialLink").value,

                deadline: document.getElementById("deadline").value,

                assignedQuiz: document.getElementById("quiz").value
            };

            const response = await fetch( //Sends a fetch request to backend API to add the new training module to the database.
                "http://localhost:8080/training-modules",
                {
                    method: "POST",//sends data to the server
                    headers: {
                        "Content-Type": "application/json"//indicates that the request body is in JSON format
                    },
                    body: JSON.stringify(trainingModule)//converts string to JSON
                }
            );

            if (response.ok) {
                alert("Training Module Added Successfully!");
                document.getElementById("trainingModuleForm").reset();//resets the form fields to their default values
            }
            else {
                alert("Failed to Add Training Module.");
            }

        });


</script>
</body>
</html>
