<!Doctype html> <!-- Specifies this is an html 5 document -->

<html> <!-- Root of an HTML page-->

<head> <!-- Contains page metadata and title. -->
    <title>Corporate Training and Assessment Management System</title>

    <!-- CSS -->
    <style>
        body {
            background-color: rgb(199, 190, 190);
            /* Sets the background color of the page */
            font-family: sans-serif;
            /* Sets the font for the body */
        }

        h1 {
            color: black;
            /* Sets the color of the main heading */
            text-align: center;
            /* Centers the main heading */
        }

        h2 {
            color: black;
            text-align: center;
        }

        p {
            color: black;
            text-align: center;
        }

        form {
            color: black;
            text-align: center;
        }

        .login-container {
            /* Styles for the login container(Login box) */
            width: 400px;
            /* Sets the width of the login container */
            margin: 0 auto;
            /* Centers the login container horizontally */
            padding: 20px;
            /* Adds padding inside the login container */
            background-color: white;
            /* Sets the background color of the login container */
            border: 1px solid #000000;
            /* Adds a solid border to the login container */
            text-align: center;
            border-radius: 5px;
            /* Rounds the corners of the login container */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        select {
            /* Styles for input and select elements */
            width: 95%;
            /* Makes the input and select elements take the full width of their container */
            padding: 10px;
            /* Adds padding inside the input and select elements */
        }

        form div {
            /* Styles for div elements inside the form */
            margin-bottom: 15px;
            /* Adds space between form fields */
        }

        button {
            /* Styles for the submit button */
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            /* Removes the default border from the button */
            cursor: pointer;
            /* Changes the cursor to a pointer when hovering over the button */
        }
        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<!-- JS -->
<script> // JavaScript function to handle login logic
    function login() { // Function to handle login logic
        let role = document.getElementById("role").value; // Gets the value of the role select element
        if (role === "admin") { // If the selected role is admin
            window.location.href = "admin-dashboard.html"; // Redirect to the admin dashboard
        }
        else if (role === "trainer") { // If the selected role is trainer
            window.location.href = "trainer-dashboard.html"; // Redirect to the trainer dashboard
        }
        else if (role === "employee") { // If the selected role is employee
            window.location.href = "employee-dashboard.html"; // Redirect to the employee dashboard
        }
        else { // If no role is selected
            alert("Please select a role to login."); // Show an alert message
        }
    }
</script>


<body> <!-- The main body of the page -->
    <h1> <!-- This is a heading <h1> - heading tag -->
        Corporate Training and Assessment Management System
    </h1>
    <p>Designed for managing corporate training and assessments.</p> <!-- Paragraph tag for description -->
    <hr style="border: 1px solid #000000;"> <!-- Horizontal rule tag with inline style of adding border -->

    <h2 style="text-align: center; margin-left: 28px;"> Login </h2>
    <div class="login-container"> <!-- Container for the login form in div tag (gets all the space in that line)-->
        <form action="#">
            <!-- Form element with action attribute specifying where to send the form data on submission -->
            <div>
                <label for="email">Email : </label> <!-- Label for the email input -->
                <input id="email" type="email" placeholder="Enter your email" required> <!-- Email input field -->
            </div>
            <div>
                <label for="password">Password : </label> <!-- Label for the password input -->
                <input id="password" type="password" placeholder="Enter your password" required>
                <!-- Password input field -->
            </div>
            <div>
                <label for="role">Role : </label> <!-- Label for the role select -->
                <select id="role" required> <!-- Dropdown select for user role -->
                    <option value="Select Role">Select Role</option> <!-- Option for admin role -->
                    <option value="admin">Admin (HR)</option> <!-- Option for admin role -->
                    <option value="trainer">Trainer</option> <!-- Option for trainer role -->
                    <option value="employee">Employee/Intern</option> <!-- Option for employee/intern role -->
                </select>
            </div>
            <button type="button" onclick="login()">Login</button> <!-- Submit button for the form -->
        </form>
    </div>

</body>

</html>
