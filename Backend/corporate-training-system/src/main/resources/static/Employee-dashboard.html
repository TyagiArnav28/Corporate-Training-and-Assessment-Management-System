<!DOCTYPE html>
<html lang="en">

<head>

    <title>Employee Dashboard</title>

    <style>
        body {
            background-color: rgb(199, 190, 190);
            font-family: sans-serif;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        p {
            text-align: left;
        }

        .card {

            background-color: lightblue;
            border: 1px solid black;
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            width: 300px;
            text-align: center;

        }

        table {

            background-color: lightblue;
            width: 90%;
            margin: auto;
            border-collapse: collapse;

        }

        table,
        th,
        td {

            border: 1px solid black;

        }

        th,
        td {

            padding: 10px;
            text-align: center;

        }

        button {

            background-color: purple;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin: 10px;

        }

        button:hover {

            background-color: darkmagenta;

        }
    </style>

</head>

<body>

    <h1>Employee Dashboard</h1>

    <p style="font-size:large;">
        Welcome Employee! Here are your training details.
    </p>

    <hr>

    <h2><u>Overview</u></h2>

    <div class="card">

        <h3>Course Progress</h3>

        <p id="courseProgress" style="text-align:center;">

            Loading...

        </p>

    </div>

    <br>

    <h2>Score History</h2>

    <table id="scoreHistoryTable">

        <thead>

            <tr>

                <th>Quiz ID</th>

                <th>Attempt Date</th>

                <th>Score</th>

                <th>Status</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <br>

    <h2>Latest Performance Review</h2>

    <table>

        <tr>

            <th>Rating</th>

            <th>Comments</th>

            <th>Improvement Areas</th>

        </tr>

        <tr>

            <td id="rating">-</td>

            <td id="comments">-</td>

            <td id="improvementAreas">-</td>

        </tr>

    </table>

    <br>

    <h2 style="text-align:left;">
        <u>Modules</u>
    </h2>

    <button onclick="window.location.href='employee-onboarding-employee.html'">

        Employee Onboarding

    </button>

    <br><br>

    <button onclick="window.location.href='employee-training-module.html'">

        Training Module

    </button>

    <br><br>

    <button onclick="window.location.href='employee-assessment&quiz-modules.html'">

        Assessment & Quiz

    </button>

    <br><br>

    <button onclick="window.location.href='employee-profile.html'">

        My Profile

    </button>

    <button onclick="logout()"style="position:absolute; top:20px; right:20px;">Logout</button>


    <br><br>

    <script>
        const BASE_URL = "https://splendid-hope-production-e0d8.up.railway.app";

        async function loadCourseProgress() {

    const response = await fetch(
        BASE_URL + "/employee-dashboard/course-progress"
    );

    const progress = await response.text();

    document.getElementById("courseProgress").innerText = progress + "%";

}

async function loadScoreHistory() {

    const response = await fetch(
        BASE_URL + "/employee-dashboard/score-history"
    );

    const attempts = await response.json();

    const tableBody =
        document.querySelector("#scoreHistoryTable tbody");

    tableBody.innerHTML = "";

    attempts.forEach(attempt => {

        tableBody.innerHTML += `

        <tr>

            <td>${attempt.quizId}</td>

            <td>${attempt.attemptDate}</td>

            <td>${attempt.score}%</td>

            <td>${attempt.status}</td>

        </tr>

        `;

    });

}

async function loadFeedback() {

    const response = await fetch(BASE_URL + "/employee-dashboard/feedback");

    if (!response.ok) {

        document.getElementById("rating").innerText = "-";
        document.getElementById("comments").innerText = "No review yet";
        document.getElementById("improvementAreas").innerText = "No review yet";
        return;
    }

    const review = await response.json();

    if (review == null) {

        document.getElementById("rating").innerText = "-";
        document.getElementById("comments").innerText = "No review yet";
        document.getElementById("improvementAreas").innerText = "No review yet";

    } else {

        document.getElementById("rating").innerText =
            review.rating + "/5";

        document.getElementById("comments").innerText =
            review.comments;

        document.getElementById("improvementAreas").innerText =
            review.improvementAreas;
    }
}

loadCourseProgress();

loadScoreHistory();

loadFeedback();

function logout() {

        window.location.href = "index.html";

    }

</script>

</body>

</html>
