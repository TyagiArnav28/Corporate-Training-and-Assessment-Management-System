<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Employee Onboarding</title>

    <style>

        body{
            font-family:sans-serif;
            background-color:rgb(199,190,190);
            margin:0;
            padding:20px;
        }

        h1,p{
            text-align:center;
        }

        .container{

            width:700px;
            margin:auto;
            background-color:lightblue;
            padding:20px;
            border-radius:10px;
            border:1px solid black;

        }

        ul{

            line-height:2;

        }

        .status{

            font-size:20px;
            font-weight:bold;
            text-align:center;

        }

        button{

            width:100%;
            padding:10px;
            margin-top:20px;
            background-color:purple;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:5px;

        }

        button:hover{

            background-color:darkmagenta;

        }

    </style>

</head>

<body>

<h1>Employee Onboarding</h1>

<p>Complete the onboarding process by following the checklist below.</p>

<hr>

<div class="container">

<h2>Onboarding Checklist</h2>

<ul>

<li>Submit Government ID Proof</li>

<li>Submit Educational Certificates</li>

<li>Submit Passport-size Photograph</li>

<li>Sign Company NDA</li>

<li>Collect Employee ID Card</li>

</ul>

<hr>

<p class="status">

Current Status :

<span id="onboardingStatus">

Loading...

</span>

</p>

<button id="completeButton" onclick="completeOnboarding()">

Complete Onboarding

</button>

<button
onclick="window.location.href='employee-dashboard.html'">

Back to Dashboard

</button>

</div>

<script>
    const BASE_URL = "https://splendid-hope-production-e0d8.up.railway.app";
    const employeeId = 1;

// Load onboarding status when page opens
async function loadOnboardingStatus() {

    try {

        const response = await fetch(BASE_URL + "/employees");

        const employees = await response.json();

        const employee = employees.find(emp => emp.id == employeeId);

        if (!employee) {

            document.getElementById("onboardingStatus").innerText =
                "Employee Not Found";

            return;
        }

        if (employee.onboardingCompleted) {

            document.getElementById("onboardingStatus").innerText =
                "Completed";

            document.getElementById("onboardingStatus").style.color =
                "green";

        } else {

            document.getElementById("onboardingStatus").innerText =
                "Pending";

            document.getElementById("onboardingStatus").style.color =
                "red";

        }

    } catch (error) {

        alert("Failed to load onboarding status.");

    }

}

// Complete onboarding
async function completeOnboarding() {

    const response = await fetch(
        BASE_URL + "/employees/" + employeeId + "/complete-onboarding",
        {
            method: "PUT"
        }
    );

    if (response.ok) {

        alert("Onboarding Completed Successfully!");

        document.getElementById("onboardingStatus").innerText =
            "Completed";

        document.getElementById("onboardingStatus").style.color =
            "green";

        document.getElementById("completeButton").disabled = true;

        document.getElementById("completeButton").innerText =
            "Onboarding Completed";

    } else {

        alert("Failed to complete onboarding.");

    }

}

// Load status when page opens
loadOnboardingStatus();

</script>

</body>

</html>
