<!DOCTYPE html>
<html lang="en">

<head>
    <title>Employee Onboarding</title>
</head>
<style>
    body {
        font-family: sans-serif;
        background-color: rgb(199, 190, 190);
    }
</style>

<body>
    <h1>Employee Onboarding</h1>
    <p>Track your onboarding progress and update your profile.</p>
    <hr style="border: 1px solid #000000;">
    <h2>Onboarding Checklist</h2>
    <input type="checkbox">
    <label>Submit Documents</label>
    <br>
    <input type="checkbox">
    <label>Account Created</label>
    <br>
    <input type="checkbox">
    <label>Complete Orientation</label>
    <br>
    <input type="checkbox">
    <label>Meet Assigned Trainer</label>
    <br>
    <input type="checkbox">
    <label>Complete Initial Training</label>
    <br>
    <button>Save</button>
    <hr style="border: 1px solid #000000;">

    <h2>Update Profile</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter Name">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter Email">
        <br>
        <br>
        <label for="department">Department:</label>
        <select id="department" required>
            <option value="">Select Department</option>
            <option value="it">IT</option>
            <option value="hr">HR</option>
            <option value="finance">Finance</option>
            <option value="marketing">Marketing</option>
        </select>
        <br>
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="Enter phone number">
        <br>
        <br>
        <button type="submit">Update Profile</button>
    </form>
</body>

</html>
